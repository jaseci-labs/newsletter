[project]
name = "jaseci-digest"
version = "0.1.0"
description = "Biweekly newsletter for the Jaseci & Jac open-source ecosystem."

[serve]
base_route_app = "app"
cl_route_prefix = "/"

[plugins.client]
enabled = true

[plugins.client.paths]
"@components/*" = "./components/*"
"@styles/*" = "./styles/*"

[plugins.scale]
enabled = true

[plugins.scale.kubernetes]
app_name = "newsletter"
namespace = "newsletter"
liveness_initial_delay = 300
liveness_failure_threshold = 10
readiness_initial_delay = 60

# Pin exact versions so the pod installs known-good releases instead of
# resolving "latest" at startup. The runtime "latest" lookup hits the GitHub
# Releases API, which gets rate-limited from the cluster and fails the deploy
# with "Could not determine latest version from GitHub Releases". These match
# the versions used in local development.
[plugins.scale.kubernetes.plugin_versions]
jaclang = "0.16.0"
jac_scale = "0.2.23"
jac_client = "0.3.21"
jac_byllm = "none"
jac_mcp = "none"


[plugins.scale.secrets]
BUTTONDOWN_API_KEY = "${BUTTONDOWN_API_KEY}"
PUBLIC_BUTTONDOWN_USERNAME = "jaseci"
PUBLIC_SITE_URL = "https://newsletter.jaseci.org"
# Authenticate the toolchain installer's api.github.com calls inside the pod so
# they aren't rate-limited (the cause of "Failed to query GitHub API"). Resolved
# from the deploy step's env at deploy time.
GITHUB_TOKEN = "${GITHUB_TOKEN}"
GH_TOKEN = "${GITHUB_TOKEN}"

[dependencies]
markdown = ">=3.5"
pyyaml = ">=6.0"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"


