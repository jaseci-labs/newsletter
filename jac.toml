[project]
name = "jaseci-digest"
version = "0.1.0"
description = "Biweekly newsletter for the Jaseci & Jac open-source ecosystem."

[serve]
base_route_app = "app"
cl_route_prefix = "/"

[plugins.client]
enabled = true

[plugins.client.paths]
"@components/*" = "./components/*"
"@styles/*" = "./styles/*"

[plugins.scale]
enabled = true

[plugins.scale.kubernetes]
app_name = "newsletter"
namespace = "newsletter"

[plugins.scale.secrets]
BUTTONDOWN_API_KEY = "${BUTTONDOWN_API_KEY}"
PUBLIC_BUTTONDOWN_USERNAME = "jaseci"
PUBLIC_SITE_URL = "https://newsletter.jaseci.org"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"
