name: Deploy newsletter with jac-scale

on:
  push:
    branches: [main]
    paths:
      - 'main.jac'
      - 'pages/**'
      - 'src/**'
      - 'styles/**'
      - 'components/**'
      - 'jac.toml'
      - 'package.json'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4.2.0
        with:
          aws-region: us-east-2
          role-to-assume: arn:aws:iam::776241927220:role/GitHubActionsJaseciDeployRole
          role-session-name: GitHubActions-Newsletter
          audience: sts.amazonaws.com

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region us-east-2 --name jaseci-cluster
          kubectl config current-context

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Jaseci packages
        run: |
          pip install --upgrade pip
          # PIN the RUNNER's toolchain. `jac start --scale` uses the runner's
          # jac-scale to GENERATE the pod manifest; the latest (0.2.31) generates
          # a pod that boot-installs `jac` via the GitHub-Releases binary installer,
          # whose api.github.com lookup fails ("Failed to query GitHub API for
          # release vX"). 0.2.23 generates a pod that doesn't use that path.
          # Pinning [plugins.scale.kubernetes.plugin_versions] alone is NOT enough --
          # it only changes which version the (still-broken) installer requests.
          pip install jaclang==0.16.0 jac-client==0.3.21 "jac-scale[deploy]==0.2.23"

      - name: Pre-deploy cluster baseline
        run: |
          echo "::group::StorageClasses (need a default)"
          kubectl get sc
          echo "::endgroup::"
          echo "::group::EBS CSI driver status"
          kubectl get pods -n kube-system -l app=ebs-csi-controller || true
          echo "::endgroup::"
          echo "::group::Current state of newsletter namespace"
          kubectl get pvc,pods,events -n newsletter --sort-by=.metadata.creationTimestamp || true
          echo "::endgroup::"

      - name: Deploy newsletter with jac-scale
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          # Passed through to the pod (via [plugins.scale.secrets]) so the
          # toolchain installer's api.github.com calls are authenticated.
          # Unauthenticated API calls from the cluster get rate-limited (60/hr)
          # and fail with "Failed to query GitHub API"; an authenticated token
          # raises that to ~1000/hr. The binary download host (github.com) was
          # never the problem -- only the api.github.com lookup.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          jac start main.jac --scale

      - name: Diagnose deploy failure
        if: failure()
        run: |
          echo "::group::PVC status (most common blocker)"
          kubectl get pvc -n newsletter
          kubectl describe pvc -n newsletter
          echo "::endgroup::"
          echo "::group::Pods + describe for code-sync"
          kubectl get pods -n newsletter
          kubectl describe pod -n newsletter -l app=newsletter-code-sync || true
          kubectl describe pod newsletter-code-sync -n newsletter || true
          echo "::endgroup::"
          echo "::group::Recent namespace events (warnings first)"
          kubectl get events -n newsletter --sort-by=.lastTimestamp --field-selector type!=Normal || true
          kubectl get events -n newsletter --sort-by=.lastTimestamp | tail -30
          echo "::endgroup::"

      - name: Verify deployment
        if: success()
        run: |
          echo "Checking deployment status..."
          kubectl get deployments -n newsletter
          kubectl get services -n newsletter
          kubectl get pods -n newsletter

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Newsletter Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- **App Name**: newsletter" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: newsletter" >> $GITHUB_STEP_SUMMARY
          echo "- **Host**: newsletter.jaseci.org" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster**: jaseci-cluster" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: us-east-2" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get all -n newsletter 2>&1 >> $GITHUB_STEP_SUMMARY || echo "Unable to fetch deployment status" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
